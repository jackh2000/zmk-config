# Uncomment to turn on logging, and set ZMK logging to debug output
# CONFIG_ZMK_USB_LOGGING=y

# Uncomment both to enable encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment to enable OLED
CONFIG_ZMK_DISPLAY=y

# Customized power settings
# Manually set board to enter idle sleep after 1.5 minutes (should be default behavior anyways)
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Enable deep sleep
CONFIG_ZMK_SLEEP=y

# Set board to enter deep sleep after 30 minutes
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
